services:
  backend:
    build:
      context: ./backend
    command: sh -c "python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8021 --workers 3"
    environment:
      POSTGRES_ENGINE: django.db.backends.postgresql
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:8021,http://127.0.0.1:8021}
      POSTGRES_DB_NAME: litecore
      POSTGRES_DB_USER: litecore
      POSTGRES_DB_PASS: litecorepass
      POSTGRES_DB_HOST: 10.11.0.30
      POSTGRES_DB_PORT: ${POSTGRES_DB_PORT:-5434}
      LITECORE_DB_NAME: litecore
      LITECORE_DB_USER: litecore
      LITECORE_DB_PASS: litecorepass
      LITECORE_DB_HOST: 10.11.0.30
      LITECORE_DB_PORT: ${LITECORE_DB_PORT:-5434}
      TMSWMS_DB_SCHEMA: tmswms
      TMSWMS_DEFAULT_ACTOR: ${TMSWMS_DEFAULT_ACTOR:-eespinoza}
      LDAP_SERVER: ${LDAP_SERVER:-}
      LDAP_DOMAIN: ${LDAP_DOMAIN:-}
      LDAP_DOMAIN_TG: ${LDAP_DOMAIN_TG:-}
      LDAP_TIMEOUT: ${LDAP_TIMEOUT:-10}
      MASTER_DATA_PARQUET_DIR: /srv/data/parquet
      ROUTING_PROVIDER: ${ROUTING_PROVIDER:-ors}
      ORS_API_KEY: ${ORS_API_KEY:-}
      ORS_BASE_URL: ${ORS_BASE_URL:-https://api.openrouteservice.org}
      ROUTING_SERVICE_MINUTES_PER_STOP: ${ROUTING_SERVICE_MINUTES_PER_STOP:-10}
      WAREHOUSE_ORIGINS: ${WAREHOUSE_ORIGINS:-}
    expose:
      - "8021"
    volumes:
      - ./backend:/app
      - C:/cache:/srv/data/parquet:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  legacy-order-sync:
    build:
      context: ./backend
    command: sh -c "until python manage.py migrate --check; do sleep 2; done; python manage.py sync_legacy_orders --watch --poll-interval ${LEGACY_ORDER_SYNC_INTERVAL_SECONDS:-10} --limit ${LEGACY_ORDER_SYNC_LIMIT:-100} --actor backend.sync"
    restart: unless-stopped
    environment:
      POSTGRES_ENGINE: django.db.backends.postgresql
      POSTGRES_DB_NAME: litecore
      POSTGRES_DB_USER: litecore
      POSTGRES_DB_PASS: litecorepass
      POSTGRES_DB_HOST: 10.11.0.30
      POSTGRES_DB_PORT: ${POSTGRES_DB_PORT:-5434}
      LITECORE_DB_NAME: litecore
      LITECORE_DB_USER: litecore
      LITECORE_DB_PASS: litecorepass
      LITECORE_DB_HOST: 10.11.0.30
      LITECORE_DB_PORT: ${LITECORE_DB_PORT:-5434}
      TMSWMS_DB_SCHEMA: tmswms
      ROUTING_PROVIDER: ${ROUTING_PROVIDER:-ors}
      ORS_API_KEY: ${ORS_API_KEY:-}
      ORS_BASE_URL: ${ORS_BASE_URL:-https://api.openrouteservice.org}
      ROUTING_SERVICE_MINUTES_PER_STOP: ${ROUTING_SERVICE_MINUTES_PER_STOP:-10}
      WAREHOUSE_ORIGINS: ${WAREHOUSE_ORIGINS:-}
    volumes:
      - ./backend:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8021
      VITE_TMSWMS_ACTOR: ${VITE_TMSWMS_ACTOR:-eespinoza}
    command: npm run dev
    ports:
      - "8021:8021"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  frontend_node_modules:
